spring.application.name=payment-service
server.port=8084

# Use Mock Payment Gateway by default (no real charges)
payment.gateway.type=mock

# JWT Configuration
jwt.secret=MyVerySecureSecretKeyForJWTTokenSigningAndValidation
jwt.expiration=86400000

# Actuator
management.endpoints.web.exposure.include=health

# Cassandra Configuration
spring.cassandra.contact-points=localhost
spring.cassandra.port=9042
spring.cassandra.keyspace-name=payment
spring.cassandra.local-datacenter=datacenter1

spring.cassandra.schema-action=none

# Feign Client URLs (use Docker service names)
order-service.url=http://order-service:8083
item-service.url=http://item-service:8082

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true

# Error handling
server.error.include-message=always
server.error.include-stacktrace=always
server.error.include-exception=true